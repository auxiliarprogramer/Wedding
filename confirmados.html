<!DOCTYPE html>
<html class="no-js">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Confirmados — Erika &amp; Jhon</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://fonts.googleapis.com/css?family=Work+Sans:400,300,600,700&family=Sacramento" rel="stylesheet">
	<link rel="stylesheet" href="css/password.css">
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			background: #1a1c10;
			font-family: 'Work Sans', Arial, sans-serif;
			color: #f0f0e8;
			min-height: 100vh;
		}

		/* Header */
		.page-header {
			background: linear-gradient(135deg, #2c2e1e 0%, #3a3d20 100%);
			padding: 30px 40px 25px;
			border-bottom: 2px solid #6B7432;
			display: flex;
			align-items: center;
			justify-content: space-between;
			position: sticky;
			top: 0;
			z-index: 100;
		}

		.page-header h1 {
			font-family: 'Sacramento', cursive;
			font-size: 36px;
			color: #a8b560;
			font-weight: normal;
		}

		.page-header .subtitle {
			font-size: 13px;
			color: #888;
			margin-top: 2px;
		}

		.back-link {
			color: #a8b560;
			text-decoration: none;
			font-size: 14px;
			border: 1px solid #6B7432;
			padding: 6px 14px;
			border-radius: 20px;
			transition: background 0.2s;
		}
		.back-link:hover { background: rgba(107,116,50,0.2); }

		/* Stats bar */
		.stats-bar {
			background: #2c2e1e;
			padding: 12px 40px;
			border-bottom: 1px solid #3a3d20;
			display: flex;
			align-items: center;
			gap: 30px;
			font-size: 13px;
			color: #888;
		}
		.stats-bar .count {
			color: #a8b560;
			font-weight: 700;
			font-size: 16px;
		}

		/* Refresh button */
		.btn-refresh {
			margin-left: auto;
			background: none;
			border: 1px solid #6B7432;
			color: #a8b560;
			font-size: 13px;
			padding: 5px 14px;
			border-radius: 20px;
			cursor: pointer;
			font-family: 'Work Sans', Arial, sans-serif;
			transition: background 0.2s;
		}
		.btn-refresh:hover { background: rgba(107,116,50,0.2); }

		/* Guest list */
		.guest-list {
			max-width: 900px;
			margin: 30px auto;
			padding: 0 20px 60px;
		}

		.guest-item {
			background: #2c2e1e;
			border: 1px solid #3a3d20;
			border-left: 4px solid #6B7432;
			border-radius: 8px;
			padding: 16px 20px;
			margin-bottom: 12px;
			display: flex;
			align-items: center;
			gap: 16px;
			transition: border-color 0.2s, background 0.2s;
		}
		.guest-item:hover {
			border-color: #a8b560;
			background: #343620;
		}

		.guest-number {
			font-size: 13px;
			color: #6B7432;
			font-weight: 700;
			min-width: 28px;
			text-align: right;
		}

		.guest-icon {
			font-size: 22px;
			min-width: 28px;
		}

		.guest-info {
			flex: 1;
		}

		.guest-name {
			font-size: 16px;
			font-weight: 600;
			color: #f0f0e8;
		}

		.guest-count-label {
			font-size: 12px;
			color: #888;
			margin-top: 3px;
		}
		.guest-count-label span {
			color: #a8b560;
		}

		.guest-badge {
			background: rgba(107,116,50,0.2);
			border: 1px solid #6B7432;
			color: #a8b560;
			font-size: 13px;
			font-weight: 700;
			padding: 5px 14px;
			border-radius: 20px;
			white-space: nowrap;
		}

		.guest-actions {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.guest-actions select {
			background: #1f2016;
			border: 1px solid #6B7432;
			color: #f0f0e8;
			border-radius: 6px;
			padding: 6px 8px;
			font-size: 13px;
			outline: none;
		}

		.btn-save {
			background: #6B7432;
			border: 1px solid #6B7432;
			color: #f0f0e8;
			font-size: 12px;
			font-weight: 700;
			padding: 6px 10px;
			border-radius: 6px;
			cursor: pointer;
			transition: opacity 0.2s;
		}
		.btn-save:hover { opacity: 0.9; }
		.btn-save:disabled { opacity: 0.45; cursor: not-allowed; }

		.guest-status {
			font-size: 12px;
			min-width: 65px;
			color: #888;
		}
		.guest-status.ok { color: #a8b560; }
		.guest-status.err { color: #ff9999; }

		/* Summary total */
		.summary-total {
			max-width: 900px;
			margin: 0 auto;
			padding: 0 20px;
			display: flex;
			justify-content: flex-end;
		}
		.summary-total .total-box {
			background: #2c2e1e;
			border: 1px solid #6B7432;
			border-radius: 8px;
			padding: 10px 24px;
			font-size: 14px;
			color: #888;
		}
		.summary-total .total-box span {
			color: #a8b560;
			font-weight: 700;
			font-size: 18px;
		}

		/* Empty state */
		.empty-state {
			text-align: center;
			padding: 80px 20px;
			color: #555;
		}
		.empty-state .emoji { font-size: 48px; display: block; margin-bottom: 16px; }
		.empty-state p { font-size: 16px; }

		/* Loading */
		.loading {
			text-align: center;
			padding: 80px 20px;
			color: #6B7432;
			font-size: 16px;
		}

		/* Scrollbar */
		::-webkit-scrollbar { width: 6px; }
		::-webkit-scrollbar-track { background: #1a1c10; }
		::-webkit-scrollbar-thumb { background: #6B7432; border-radius: 3px; }

		@media (max-width: 760px) {
			.guest-item {
				flex-wrap: wrap;
				gap: 10px;
			}
			.guest-actions {
				width: 100%;
				justify-content: flex-end;
			}
		}
	</style>
</head>
<body>

	<!-- Password overlay -->
	<div id="password-overlay">
		<h2>💌 Confirmados</h2>
		<p>Ingresa la contraseña para acceder</p>
		<input type="password" id="pw-input" placeholder="Contraseña" autocomplete="off">
		<button onclick="verificarPassword()">Entrar</button>
		<span id="pw-error"></span>
	</div>

	<div id="page-content" style="display:none;">
	<div class="page-header">
		<div>
			<h1>💌 Invitados Confirmados</h1>
			<div class="subtitle">Erika &amp; Jhon · 15.08.2026</div>
		</div>
		<a href="index.html" class="back-link">← Volver</a>
	</div>

	<div class="stats-bar">
		<span>Grupos confirmados: <span class="count" id="groups-count">—</span></span>
		<span>Total asistentes: <span class="count" id="total-count">—</span></span>
		<button class="btn-refresh" onclick="cargarConfirmados()">⟳ Actualizar</button>
	</div>

	<div class="summary-total" id="summary-total" style="display:none;">
		<div class="total-box">Total de personas confirmadas: <span id="total-personas">—</span></div>
	</div>

	<div class="guest-list" id="guest-list">
		<div class="loading">Cargando confirmaciones...</div>
	</div>

	</div><!-- /#page-content -->

	<script src="js/config.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script>
		const SUPABASE_URL = 'https://pfhdmobkdmdckxshfbma.supabase.co';
		const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmaGRtb2JrZG1kY2t4c2hmYm1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDIyNzUsImV4cCI6MjA5MTUxODI3NX0.UzxC3xuQnYupDGjS5-R-zG-8jvdq6T7PP8oNfy_Wmvs';
		const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
		let _updatingIds = new Set();

		function escapeHtml(str) {
			if (!str) return '';
			return String(str)
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;');
		}

		async function cargarConfirmados() {
			const listEl = document.getElementById('guest-list');
			const groupsEl = document.getElementById('groups-count');
			const totalEl = document.getElementById('total-count');
			const totalPersonasEl = document.getElementById('total-personas');
			const summaryEl = document.getElementById('summary-total');

			listEl.innerHTML = '<div class="loading">Cargando confirmaciones...</div>';
			summaryEl.style.display = 'none';

			const { data, error } = await sb
				.from('invitaciones_boda')
				.select('id, nombre, asistentes_confirmados, cupos_total')
				.neq('asistentes_confirmados', 0)
				.order('nombre', { ascending: true });

			if (error || !data) {
				listEl.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>Error al cargar las confirmaciones.</p></div>';
				return;
			}

			groupsEl.textContent = data.length;

			if (data.length === 0) {
				totalEl.textContent = '0';
				listEl.innerHTML = '<div class="empty-state"><span class="emoji">💌</span><p>Aún no hay confirmaciones registradas.</p></div>';
				return;
			}

			const total = data.reduce((sum, row) => sum + (Number(row.asistentes_confirmados) || 0), 0);
			totalEl.textContent = total;
			totalPersonasEl.textContent = total;
			summaryEl.style.display = 'flex';

			listEl.innerHTML = data.map((row, i) => {
				const current = Number(row.asistentes_confirmados) || 0;
				const maxCupos = Math.max(Number(row.cupos_total) || current || 1, 1);
				const options = Array.from({ length: maxCupos }, (_, idx) => {
					const val = idx + 1;
					const selected = val === current ? ' selected' : '';
					return `<option value="${val}"${selected}>${val}</option>`;
				}).join('');

				return `
				<div class="guest-item">
					<div class="guest-number">${i + 1}</div>
					<div class="guest-icon">👤</div>
					<div class="guest-info">
						<div class="guest-name">${escapeHtml(row.nombre)}</div>
						<div class="guest-count-label">Asistentes confirmados: <span>${escapeHtml(String(row.asistentes_confirmados))}</span> de ${escapeHtml(String(maxCupos))} cupos</div>
					</div>
					<div class="guest-badge">${escapeHtml(String(row.asistentes_confirmados))} 🎉</div>
					<div class="guest-actions">
						<select class="guest-select" id="sel-${row.id}" data-id="${row.id}" data-current="${current}" aria-label="Asistentes de ${escapeHtml(row.nombre)}">
							${options}
						</select>
						<button class="btn-save" data-id="${row.id}" data-name="${escapeHtml(row.nombre)}">Guardar</button>
						<span class="guest-status" id="st-${row.id}"></span>
					</div>
				</div>
			`;
			}).join('');
		}

		async function actualizarAsistentes(id) {
			if (!id || _updatingIds.has(id)) return;

			const selectEl = document.getElementById(`sel-${id}`);
			const statusEl = document.getElementById(`st-${id}`);
			if (!selectEl || !statusEl) return;

			const nuevoValor = Number(selectEl.value);
			const valorActual = Number(selectEl.getAttribute('data-current'));

			if (nuevoValor === valorActual) {
				statusEl.className = 'guest-status';
				statusEl.textContent = 'Sin cambios';
				setTimeout(() => { statusEl.textContent = ''; }, 1200);
				return;
			}

			_updatingIds.add(id);
			const btnEl = document.querySelector(`.btn-save[data-id="${id}"]`);
			if (btnEl) btnEl.disabled = true;

			statusEl.className = 'guest-status';
			statusEl.textContent = 'Guardando...';

			const { error } = await sb
				.from('invitaciones_boda')
				.update({
					asistentes_confirmados: nuevoValor,
					confirmado: nuevoValor > 0,
					fecha_confirmacion: new Date().toISOString()
				})
				.eq('id', id);

			_updatingIds.delete(id);
			if (btnEl) btnEl.disabled = false;

			if (error) {
				statusEl.className = 'guest-status err';
				statusEl.textContent = 'Error';
				return;
			}

			selectEl.setAttribute('data-current', String(nuevoValor));
			statusEl.className = 'guest-status ok';
			statusEl.textContent = 'Guardado';

			await cargarConfirmados();
		}

		document.addEventListener('click', function (e) {
			const btn = e.target.closest('.btn-save');
			if (!btn) return;
			const id = btn.getAttribute('data-id');
			actualizarAsistentes(id);
		});

		// ── Password protection ──────────────────────────────────────
		let _authenticated = false;

		if (!APP_CONFIG.REQUIRE_PASSWORD) {
			_authenticated = true;
			document.getElementById('password-overlay').style.display = 'none';
			document.getElementById('page-content').style.display = 'block';
			cargarConfirmados();
		} else {
			const _overlay = document.getElementById('password-overlay');
			const _content = document.getElementById('page-content');

			const _lockObserver = new MutationObserver(function () {
				if (!_authenticated) {
					_overlay.style.cssText = 'display:flex !important; position:fixed; inset:0; z-index:9999;';
					_content.style.cssText = 'display:none !important;';
				}
			});
			_lockObserver.observe(_overlay, { attributes: true });
			_lockObserver.observe(_content, { attributes: true });

			new MutationObserver(function (mutations) {
				mutations.forEach(function (m) {
					m.removedNodes.forEach(function (node) {
						if (node === _overlay && !_authenticated) {
							document.body.prepend(_overlay);
						}
					});
				});
			}).observe(document.body, { childList: true, subtree: true });
		}

		async function verificarPassword() {
			const input = document.getElementById('pw-input').value.trim();
			const errEl = document.getElementById('pw-error');
			if (!input) return;
			errEl.textContent = '';
			const { data, error } = await sb.from('password').select('password');
			if (error || !data) { errEl.textContent = 'Error de conexión.'; return; }
			const match = data.some(row => row.password === input);
			if (match) {
				_authenticated = true;
				document.getElementById('password-overlay').style.display = 'none';
				document.getElementById('page-content').style.display = 'block';
				cargarConfirmados();
			} else {
				errEl.textContent = 'Contraseña incorrecta.';
				document.getElementById('pw-input').value = '';
			}
		}

		document.getElementById('pw-input').addEventListener('keydown', function (e) {
			if (e.key === 'Enter') verificarPassword();
		});
	</script>
</body>
</html>
